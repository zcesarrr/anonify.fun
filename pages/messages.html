<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/components.js" defer></script>
    <link rel="stylesheet" href="css/messagesMainContent.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" href="icons/icon.svg" type="image/svg">
    <title>Anonify</title>
</head>
<body>
    <header-component></header-component>

    <main id="mainContent">
        <div id="messagesContainer">
           <h1>Messages</h1>
           <div id="messagesContent">
                <div id="status-container">
                    <p id="server-status-messages">Fetching...</p>
                    <button class="one-click-button" id="retry-button-messages" hidden>Retry</button>
                </div>
                <!--<div class="messageBox" hidden>
                    <div class="messageBox-createdAt">
                        <div class="messageBox-createdAt-date">11/27/2025</div>
                        -
                        <div class="messageBox-createdAt-time">17:52</div>
                    </div>
                    <p>hola que tal probnaod</p>
                </div>-->
           </div>
           <br>
           <div id="pagination" hidden></div>
        </div>
        <div id="searchContainer">
            <h1>Search</h1>
            <form action="#">
                <div id="search-input">
                    <input type="search" required minlength="36" maxlength="36" id="search-box-input">
                    <button type="button" id="paste-button" class="one-click-button">Paste</button>
                </div>
                <button type="button" id="search-message-button" class="one-click-button" disabled>
                    Search
                </button>
            </form>
            <p id="search-server-status"></p>
        </div>
    </main>

    <div id="yourMessageModal" class="modal">
        <div class="modal-content">
            <h2>Message Found</h2>
            
            <div id="yourMessageModalBox" class="messageBox">
                <div class="messageBox-createdAt">
                    <div class="messageBox-createdAt-date" id="yourMessage-messageBox-createdAt-date">11/27/2025</div>
                    -
                    <div class="messageBox-createdAt-time" id="yourMessage-messageBox-createdAt-time">17:52</div>
                </div>
                <p id="yourMessage-messageBox-content">Tengo una pregunta CesarZ, si tuvieras que ser un perrito, de que raza serias? Creo que es mas que adecuado este tamaño, por ahora... Se me acaba byeeeeeeeeee uy no</p>
            </div>

            <p id="yourMessage-cesarz-response" class="cesarz-response">> CesarZ's response</p>

            <br><button class="one-click-button close-modal-btn">Close</button>
        </div>
    </div>

    <div id="cesarzResponseModal" class="modal">
        <div class="modal-content">
            <h2>Author's Response</h2>

            <p id="cesarzResponseModalContent" class="cesarz-response">Hola</p>

            <br><button class="one-click-button close-modal-btn" id="close-cesarz-response">Close</button>
        </div>
    </div>

    <footer-component></footer-component>

    <script src="scripts/components_logic.js" id="components-logic-script" data-current-index="2" defer></script>
    <script src="scripts/modal.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/messagesPage.js"></script>
</body>
</html>
