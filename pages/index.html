<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/components.js" defer></script>
    <link rel="stylesheet" href="css/homeMainContent.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <title>Confessss!</title>
</head>
<body>
    <header-component></header-component>

    <main id="mainContent">
        <form id="messageForm">
            <label for="msgForm_message">Write your anonymous message!</label><br>
            <textarea rows="6" cols="42" id="msgForm_message" name="msgForm_message" minlength="6" required></textarea><br>
            <p id="rules-advice">Please, before send your message, check the <a href="#" class="highlight-nav-button">rules</a>!</p>
            <div id="msgForm_submitContainer">
                <button id="msgForm_submitBtn" type="submit" disabled>Send</button>
                <div id="msgForm_submitContainer_rateTime"></div>
            </div>

        </form>
        
        <div id="messageFormResult">‎ </div>
        <p id="copy-advice"></p>
    </main>

    <footer-component></footer-component>

    <!--<script src="scripts/_lastMessagesHandle.js"></script>-->
    <script src="scripts/app.js"></script>
</body>
</html>
