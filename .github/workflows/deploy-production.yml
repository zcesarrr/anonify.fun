name: Deploy to Production

on:
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necesario para crear nueva rama
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
    
    - name: Create or checkout production branch
      run: |
        # Crear rama production si no existe, o hacer checkout si existe
        git checkout -B production
    
    - name: Remove _notes and sql directories
      run: |
        rm -rf _notes sql
        echo "Removed _notes and sql directories"
    
    - name: Remove files starting with underscore from client directory
      run: |
        find client -name "_*" -type f -delete
        echo "Removed files starting with underscore from client directory"
    
    - name: Move app.js to root directory
      run: |
        if [ -f client/app.js ]; then
          mv client/app.js ./app.js
          echo "Moved client/app.js to root directory"
        else
          echo "client/app.js not found"
        fi
    
    - name: Create dist directory structure
      run: |
        mkdir -p dist/static dist/server
        echo "Created dist directory with static and server subdirectories"
    
    - name: Move static files to dist/static
      run: |
        # Mover archivos estáticos
        mv index.html dist/static/
        mv style.css dist/static/
        mv app.js dist/static/
        mv icons/ dist/static/
        
        echo "Moved static files to dist/static/"
        echo "Static files: index.html, style.css, app.js, icons/"
    
    - name: Move server files to dist/server
      run: |
        # Mover toda la carpeta server
        mv server/ dist/
        
        echo "Moved server directory to dist/server/"
    
    - name: Remove underscore script references from index.html
      run: |
        # Crear copia de seguridad
        cp dist/static/index.html dist/static/index.html.bak
        
        # Remover líneas que contengan referencias a archivos que empiecen con underscore
        sed -i '/src="[^"]*\/_[^"]*"/d' dist/static/index.html
        sed -i '/href="[^"]*\/_[^"]*"/d' dist/static/index.html
        
        # Remover comentarios que referencien archivos que empiecen con underscore
        sed -i '/<!--.*client\/_.*-->/d' dist/static/index.html
        sed -i '/<!--.*\/_.*-->/d' dist/static/index.html
        
        echo "Updated dist/static/index.html - removed underscore file references"
    
    - name: Update script reference in index.html
      run: |
        # Cambiar la referencia de client/app.js a app.js
        sed -i 's|client/app\.js|app.js|g' dist/static/index.html
        echo "Updated app.js reference in dist/static/index.html"
    
    - name: Show changes made
      run: |
        echo "=== Files and directories removed/modified ==="
        git status --porcelain
        echo ""
        echo "=== Changes in index.html ==="
        diff dist/static/index.html.bak dist/static/index.html || true
        echo ""
        echo "=== Final dist directory structure ==="
        find dist -type f | sort
        echo ""
        echo "=== Remaining files in root ==="
        find . -maxdepth 1 -type f -name "*.js" -o -name "*.html" -o -name "*.css" -o -name "*.md" | sort
    
    - name: Commit and push changes to production branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add .
        git add -u # Para incluir archivos eliminados
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🚀 Production build - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin production --force
          echo "✅ Changes pushed to production branch"
        fi
    
    - name: Create production summary
      run: |
        echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** production" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Changes Made:" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed \`_notes\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed \`sql\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed all files starting with \`_\` from \`client/\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 Created \`dist/\` directory structure" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 Moved static files to \`dist/static/\` (index.html, style.css, app.js, icons/)" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 Moved \`server/\` directory to \`dist/server/\`" >> $GITHUB_STEP_SUMMARY
        echo "- 🔧 Updated \`index.html\` to remove underscore file references" >> $GITHUB_STEP_SUMMARY
        echo "- 🔗 Updated \`app.js\` script reference in \`index.html\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Production Branch" >> $GITHUB_STEP_SUMMARY
        echo "The production-ready code is now available in the \`production\` branch with the following structure:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY
        echo "dist/" >> $GITHUB_STEP_SUMMARY
        echo "├── static/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── index.html" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── style.css" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── app.js" >> $GITHUB_STEP_SUMMARY
        echo "│   └── icons/" >> $GITHUB_STEP_SUMMARY
        echo "└── server/" >> $GITHUB_STEP_SUMMARY
        echo "    ├── server.js" >> $GITHUB_STEP_SUMMARY
        echo "    ├── package.json" >> $GITHUB_STEP_SUMMARY
        echo "    └── config/" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY