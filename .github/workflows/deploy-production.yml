name: Deploy to Production

on:
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necesario para crear nueva rama
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
    
    - name: Create or checkout production branch
      run: |
        # Crear rama production si no existe, o hacer checkout si existe
        git checkout -B production
    
    - name: Remove _notes and sql directories
      run: |
        rm -rf _notes sql
        echo "Removed _notes and sql directories"
    
    - name: Create client directory and move pages content
      run: |
        mkdir -p client
        mv pages/* client/
        rmdir pages
        echo "Created client directory and moved all pages content to client/"
    
    - name: Update config.js to set dev to false
      run: |
        if [ -f client/scripts/config.js ]; then
          sed -i 's/const dev = true;/const dev = false;/' client/scripts/config.js
          echo "Updated config.js: set dev = false"
        else
          echo "Warning: client/scripts/config.js not found"
        fi
    
    - name: Remove files starting with underscore from client directory
      run: |
        find client -name "_*" -type f -delete 2>/dev/null || true
        echo "Removed files starting with underscore from client directory"
    
    - name: Minify CSS files (optional optimization)
      run: |
        # Simple minification - remove comments and extra whitespace
        for css_file in $(find client -name "*.css"); do
          if [ -f "$css_file" ]; then
            # Remove comments and compress whitespace
            sed -i 's|/\*.*\*/||g' "$css_file"
            sed -i 's/  */ /g' "$css_file"
            sed -i '/^[[:space:]]*$/d' "$css_file"
          fi
        done
        echo "Applied basic CSS minification"
    
    - name: Create production summary of structure
      run: |
        echo "=== Final client directory structure ==="
        find client -type f | sort
        echo ""
        echo "=== Server directory structure ==="
        find server -type f | sort
    
    - name: Show changes made
      run: |
        echo "=== Files and directories removed/modified ==="
        git status --porcelain
        echo ""
        echo "=== Final project structure ==="
        find . -type d -name ".git" -prune -o -type f -print | sort
        echo ""
        echo "=== Config.js content ==="
        if [ -f client/scripts/config.js ]; then
          cat client/scripts/config.js
        fi
    
    - name: Commit and push changes to production branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add .
        git add -u # Para incluir archivos eliminados
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🚀 Production build - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin production --force
          echo "✅ Changes pushed to production branch"
        fi
    
    - name: Create production summary
      run: |
        echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** production" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Changes Made:" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed \`_notes\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed \`sql\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 Created \`client/\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 Moved all \`pages/\` content to \`client/\`" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed \`pages\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- 🔧 Updated \`config.js\`: set \`dev = false\`" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Removed all files starting with \`_\` from \`client/\` directory" >> $GITHUB_STEP_SUMMARY
        echo "- ⚡ Applied CSS minification for better performance" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Production Branch Structure" >> $GITHUB_STEP_SUMMARY
        echo "The production-ready code is now available in the \`production\` branch with the following structure:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY
        echo "client/" >> $GITHUB_STEP_SUMMARY
        echo "├── index.html" >> $GITHUB_STEP_SUMMARY
        echo "├── about.html" >> $GITHUB_STEP_SUMMARY
        echo "├── messages.html" >> $GITHUB_STEP_SUMMARY
        echo "├── css/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── style.css" >> $GITHUB_STEP_SUMMARY
        echo "│   └── ..." >> $GITHUB_STEP_SUMMARY
        echo "├── scripts/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── app.js" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── config.js (dev = false)" >> $GITHUB_STEP_SUMMARY
        echo "│   └── ..." >> $GITHUB_STEP_SUMMARY
        echo "└── icons/" >> $GITHUB_STEP_SUMMARY
        echo "server/" >> $GITHUB_STEP_SUMMARY
        echo "├── server.js" >> $GITHUB_STEP_SUMMARY
        echo "├── package.json" >> $GITHUB_STEP_SUMMARY
        echo "└── config/" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY