<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="https://unpkg.com/pixelarticons/pixelarticons.css">
    <title>NGL Like App</title>
</head>
<body>
    <div id="container">
        <div id="mainContent">
            <form id="messageForm">
                <label for="msgForm_message">Write your anonymous message!</label><br>
                <textarea rows="8" cols="48" id="msgForm_message" name="msgForm_message" minlength="6" required></textarea><br>
                <div id="msgForm_submitContainer">
                    <button id="msgForm_submitBtn" type="submit" disabled>Send</button>
                    <div id="msgForm_submitContainer_rateTime"></div>
                </div>
            </form>

            <br><br><div id="messageFormResult"></div>
        </div>
    </div>

    <!--<script src="client/_lastMessagesHandle.js"></script>-->
    <script src="client/app.js"></script>
</body>
</html>
