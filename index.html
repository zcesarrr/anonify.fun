<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NGL Like App</title>
</head>
<body>
    <div id="container">
        <div id="mainContent">
            <form id="messageForm">
                <label for="msgForm_message">Write your anonymous message!</label><br>
                <textarea rows="4" cols="32" id="msgForm_message" name="msgForm_message" minlength="6" required></textarea><br>
                <button id="msgForm_submitBtn" type="submit">Send</button>
            </form>

            <br><div id="messageFormResult"></div>
        </div>
    </div>

    <script src="client/globalReferences.js"></script>
    <script src="client/msgFormPlaceholderHandle.js"></script>
    <script src="client/submitMessage.js"></script>
    <!--<script src="scripts/_lastMessagesHandle.js"></script>-->
</body>
</html>
